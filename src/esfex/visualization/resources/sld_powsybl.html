<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ESFEX SLD (PowSyBl)</title>
<style>
  html, body { margin: 0; height: 100%; background: #ffffff; overflow: hidden;
               font-family: system-ui, sans-serif; }
  #viewport { position: absolute; inset: 0; cursor: grab; }
  #viewport.dragging { cursor: grabbing; }
  #stage { transform-origin: 0 0; }
  #stage svg { display: block; }
  #empty { position: absolute; inset: 0; display: flex; align-items: center;
           justify-content: center; color: #888; font-size: 14px; }
  /* Selection highlight injected onto PowSyBl element groups. */
  .esfex-selected { outline: none; }
  .esfex-selected * { stroke: #ff8c00 !important; }
</style>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div id="viewport"><div id="stage"></div></div>
  <div id="empty">No single-line diagram yet.</div>

<script>
"use strict";
var sldBridge = null;
var scale = 1, tx = 0, ty = 0;
var stage = document.getElementById('stage');
var viewport = document.getElementById('viewport');
var empty = document.getElementById('empty');
var selectedEl = null;

new QWebChannel(qt.webChannelTransport, function (channel) {
    sldBridge = channel.objects.sldBridge;
    if (sldBridge && sldBridge.on_sld_ready) sldBridge.on_sld_ready();
});

function _applyTransform() {
    stage.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
}

function fitView() {
    var svg = stage.querySelector('svg');
    if (!svg) return;
    var vb = svg.viewBox && svg.viewBox.baseVal;
    var w = (vb && vb.width) || svg.width.baseVal.value || stage.offsetWidth;
    var h = (vb && vb.height) || svg.height.baseVal.value || stage.offsetHeight;
    if (!w || !h) return;
    var pad = 24;
    var s = Math.min((viewport.clientWidth - pad) / w,
                     (viewport.clientHeight - pad) / h);
    scale = (isFinite(s) && s > 0) ? s : 1;
    tx = (viewport.clientWidth - w * scale) / 2;
    ty = (viewport.clientHeight - h * scale) / 2;
    _applyTransform();
}

// Render a PowSyBl SVG string into the stage.
function renderPowsyblSvg(svgString) {
    selectedEl = null;
    stage.innerHTML = svgString || '';
    var svg = stage.querySelector('svg');
    empty.style.display = svg ? 'none' : 'flex';
    if (!svg) return;
    // Make the root SVG size to its own coordinate system; we scale via CSS.
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    _wireSelection(svg);
    fitView();
}

// Clicking a PowSyBl element group (id = PowSyBl element id) selects it.
function _wireSelection(svg) {
    svg.addEventListener('click', function (ev) {
        var g = ev.target.closest('[id]');
        // Walk up to a group whose id looks like a connectable id.
        while (g && g !== svg && !_looksLikeElement(g.id)) {
            g = g.parentElement && g.parentElement.closest('[id]');
        }
        if (g && _looksLikeElement(g.id)) {
            _setSelected(g);
            if (sldBridge && sldBridge.on_element_selected)
                sldBridge.on_element_selected('powsybl', g.id);
        } else {
            _setSelected(null);
            if (sldBridge && sldBridge.on_element_deselected)
                sldBridge.on_element_deselected();
        }
    });
}

function _looksLikeElement(id) {
    return !!id && /^(G|BAT|LD|ELZ|L|T)[A-Za-z0-9_]/.test(id);
}

function _setSelected(g) {
    if (selectedEl) selectedEl.classList.remove('esfex-selected');
    selectedEl = g;
    if (g) g.classList.add('esfex-selected');
}

function highlightElement(_type, elementId) {
    var svg = stage.querySelector('svg');
    if (!svg) return;
    var g = svg.querySelector('[id="' + (window.CSS ? CSS.escape(elementId) : elementId) + '"]');
    _setSelected(g || null);
}

function clearSelection() { _setSelected(null); }

function exportSvg() {
    var svg = stage.querySelector('svg');
    if (svg && sldBridge && sldBridge.on_svg_exported)
        sldBridge.on_svg_exported(new XMLSerializer().serializeToString(svg));
}

// ── Pan & zoom ──
viewport.addEventListener('wheel', function (ev) {
    ev.preventDefault();
    var rect = viewport.getBoundingClientRect();
    var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    var factor = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
    var ns = Math.max(0.05, Math.min(20, scale * factor));
    // zoom toward the cursor
    tx = mx - (mx - tx) * (ns / scale);
    ty = my - (my - ty) * (ns / scale);
    scale = ns;
    _applyTransform();
}, { passive: false });

var panning = false, px = 0, py = 0;
viewport.addEventListener('mousedown', function (ev) {
    if (ev.button !== 0) return;
    panning = true; px = ev.clientX; py = ev.clientY;
    viewport.classList.add('dragging');
});
window.addEventListener('mousemove', function (ev) {
    if (!panning) return;
    tx += ev.clientX - px; ty += ev.clientY - py;
    px = ev.clientX; py = ev.clientY;
    _applyTransform();
});
window.addEventListener('mouseup', function () {
    panning = false; viewport.classList.remove('dragging');
});
window.addEventListener('resize', fitView);
</script>
</body>
</html>
