# Codecov configuration for ESFEX.
# Coverage is reported but never fails CI or blocks merges — it is a signal,
# not a gate (matches the lint job's informational stance).

coverage:
  precision: 1
  round: down
  range: "50...90"
  status:
    project:
      default:
        target: auto
        threshold: 2%
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

# Coverage is reported per language via flags: `python` (pytest, coverage.xml)
# and `julia` (Pkg.test, lcov.info). carryforward keeps a flag's last result
# when a run doesn't re-upload it.
flags:
  python:
    paths:
      - "src/esfex"
    carryforward: true
  julia:
    paths:
      - "src/esfex/julia/src"
    carryforward: true

# Tests, bundled JS/HTML resources, docs and icons are excluded. (The Julia
# tree is no longer ignored — its line coverage is uploaded under the `julia`
# flag.)
ignore:
  - "tests/**"
  - "tools/**"
  - "docs/**"
  - "src/esfex/visualization/resources/**"
  - "src/esfex/icons/**"
